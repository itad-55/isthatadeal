name: Update Data & Deploy
on:
  schedule:
    - cron: '0 14 * * 1,4,0'  # Mon, Thu, Sun at 9am ET
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Collect Flipp historical prices
        run: python3 scripts/collect_flipp_prices.py
      - name: Update StatCan data
        run: python3 scripts/update_data.py
      - name: Build site files
        run: python3 scripts/build_site.py
      - name: Build digest draft (runs script, script decides if Thursday)
        run: python3 scripts/send_digest.py
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          FORCE_DIGEST: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
      - name: Check if anything changed
        id: diff
        run: |
          git diff --quiet index.html checker.html data/ && \
            echo "changed=false" >> $GITHUB_OUTPUT || \
            echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit changes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html checker.html data/
          git commit -m "chore: weekly data update $(date +'%Y-%m-%d')"
          git push
      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "${{ secrets.FTP_PASSWORD }}" sftp \
            -o StrictHostKeyChecking=no \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} << 'SFTP'
          put index.html /home/dh_idwckm/isthatadeal.ca/index.html
          put checker.html /home/dh_idwckm/isthatadeal.ca/checker.html
          put privacy.html /home/dh_idwckm/isthatadeal.ca/privacy.html
          put terms.html /home/dh_idwckm/isthatadeal.ca/terms.html
          put cookies.html /home/dh_idwckm/isthatadeal.ca/cookies.html
          -put data/digest_thisweek.html /home/dh_idwckm/isthatadeal.ca/thisweek.html
          -put data/digest_verify_2833151ff2ae0f3d.html /home/dh_idwckm/isthatadeal.ca/verify_2833151ff2ae0f3d.html
          bye
          SFTP
      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "No changes detected — skipping deploy."
